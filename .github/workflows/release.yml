name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'evocode-v__VERSION__'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: false
          prerelease: false
          target: ${{ matrix.target }}

      - name: Ad-hoc sign & verify macOS app
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          echo "=== Diagnostic ==="
          pwd
          echo "--- src-tauri/ ---"
          ls -la src-tauri/ 2>&1 || true
          echo "--- target/ ---"
          ls -la src-tauri/target/ 2>&1 || echo "no target dir"
          echo "--- target tree (depth 4) ---"
          find src-tauri/target -maxdepth 4 -type d 2>&1 | head -60 || true
          echo "--- bundle dirs anywhere ---"
          find "$GITHUB_WORKSPACE" -name "bundle" -type d 2>&1 || true
          echo "--- any .app found ---"
          find "$GITHUB_WORKSPACE" -name "*.app" -type d 2>&1 || true
          echo "=== Locating .app ==="
          APP_PATH=""
          for C in \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/evocode-tauri.app" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos/evocode.app" \
            "src-tauri/target/release/bundle/macos/evocode-tauri.app" \
            "src-tauri/target/release/bundle/macos/evocode.app"; do
            if [ -d "$C" ]; then
              APP_PATH="$C"
              echo "Matched candidate: $C"
              break
            fi
          done
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$GITHUB_WORKSPACE" -path "*/bundle/macos/*.app" -type d 2>/dev/null | head -1 || true)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::No .app bundle found. See diagnostic above."
            exit 1
          fi
          echo "Using APP_PATH=$APP_PATH"
          ls -la "$APP_PATH" | head -20
          echo ""
          echo "=== Signing ==="
          codesign --force --deep --sign - "$APP_PATH"
          echo ""
          echo "=== Verify ==="
          codesign --verify --verbose=2 "$APP_PATH"
          echo ""
          echo "=== Details ==="
          codesign -dvv "$APP_PATH" 2>&1 | head -20